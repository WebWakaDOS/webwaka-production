# WebWaka Production Suite — Cloudflare Workers Configuration
# Blueprint Reference: Part 3.2 — Cloudflare Workers + D1 + KV
# Invariant 1: Build Once Use Infinitely — single worker, multiple modules
# Invariant 5: Nigeria First — deployed to Cloudflare's African PoPs

name = "webwaka-production-api"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Default (Development) Environment ────────────────────────────────────────
[vars]
ENVIRONMENT = "development"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "d4edbca6cb414f76becb4ee01acf12ba"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a6155e7a95564dd0af7d99211bce618e"

[[d1_databases]]
binding = "DB"
database_name = "webwaka-production-db-dev"
database_id = "NEEDS_D1_UPGRADE"

# ─── Staging Environment ──────────────────────────────────────────────────────
[env.staging]
name = "webwaka-production-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "fbd98b2d66b140fdbc68b98bddbcd349"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "599e5527254b4bdc9fd9844a2544a6be"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-production-db-staging"
database_id = "NEEDS_D1_UPGRADE"

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "webwaka-production-api-prod"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "e6c85d62d29f4b05b93c105338ca06ec"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "e7996f52bc0046aa945c7aa22b15c890"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-production-db-prod"
database_id = "NEEDS_D1_UPGRADE"

# NOTE: Replace all PLACEHOLDER_* values with real Cloudflare resource IDs
# before deploying. JWT_SECRET must be set as a Cloudflare Workers Secret
# (not in wrangler.toml) using: wrangler secret put JWT_SECRET
