# WebWaka Production Suite — Cloudflare Workers Configuration
# Blueprint Reference: Part 3.2 — Cloudflare Workers + D1 + KV
# Invariant 1: Build Once Use Infinitely — single worker, multiple modules
# Invariant 5: Nigeria First — deployed to Cloudflare's African PoPs

name = "webwaka-production-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Default (Development) Environment ────────────────────────────────────────
[vars]
ENVIRONMENT = "development"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "d4edbca6cb414f76becb4ee01acf12ba"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a6155e7a95564dd0af7d99211bce618e"

[[d1_databases]]
binding = "DB"
database_name = "webwaka-production-db-dev"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

# ─── Staging Environment ──────────────────────────────────────────────────────
[env.staging]
name = "webwaka-production-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "fbd98b2d66b140fdbc68b98bddbcd349"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "599e5527254b4bdc9fd9844a2544a6be"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-staging-db"
database_id = "d7278ca0-2408-40d5-a08b-d8456601f667"
migrations_dir = "migrations"

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "webwaka-production-api-prod"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "e6c85d62d29f4b05b93c105338ca06ec"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "e7996f52bc0046aa945c7aa22b15c890"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-production-db"
database_id = "d01940d3-d69e-4455-94ba-bc2404cb3872"
migrations_dir = "migrations"

# NOTE: JWT_SECRET must be set as a Cloudflare Workers Secret (not in wrangler.toml)
# using: wrangler secret put JWT_SECRET
