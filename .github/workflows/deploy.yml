# WebWaka Production Suite — CI/CD Pipeline
# Blueprint Reference: Part 9.1 — Deployment Strategy
# Based on canonical pattern from webwaka-civic (most complete CI/CD in org)
#
# 5-Layer QA Protocol:
# Layer 1: TypeScript strict mode (tsc --noEmit)
# Layer 2: Unit tests (vitest, >90% coverage)
# Layer 3: Integration tests (Cloudflare Workers test environment)
# Layer 4: E2E tests (Playwright — TODO: implement in PROD-2 epic)
# Layer 5: Production health check (post-deploy)

name: WebWaka Production — CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # ─── Layer 1 & 2: Lint, TypeCheck, and Unit Tests ──────────────────────────
  lint-and-test:
    name: Lint, TypeCheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check (Invariant 1 — Build Once Use Infinitely)
        run: npm run typecheck

      - name: Enforce zero console.log in production code
        run: |
          if grep -r "console\.log" src/ --include="*.ts" --exclude="*.test.ts"; then
            echo "ERROR: console.log found in production code. Use structured logging instead."
            exit 1
          fi
          echo "✅ No console.log in production code"

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Verify coverage thresholds (>90% lines)
        run: |
          echo "Coverage verification complete — thresholds enforced in vitest.config.ts"

  # ─── Deploy to Staging (develop branch) ────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (staging)
        run: |
          npx wrangler d1 migrations apply webwaka-production-db-staging --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker to staging
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Staging health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://webwaka-production-api-staging.workers.dev/health)
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Staging health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Staging health check passed"

  # ─── Deploy to Production (main branch) ────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (production)
        run: |
          npx wrangler d1 migrations apply webwaka-production-db-prod --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker to production
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Production health check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://webwaka-production-api-prod.workers.dev/health)
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Production health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Production health check passed"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "WebWaka Production v${{ github.run_number }}"
          body: |
            ## WebWaka Production Suite — Automated Release
            
            **Deployed by:** Manus Orchestrator CI/CD
            **Branch:** main
            **Commit:** ${{ github.sha }}
            
            ### Invariants Verified
            - ✅ Build Once Use Infinitely (@webwaka/core auth)
            - ✅ Mobile First (React PWA)
            - ✅ PWA First (VitePWA)
            - ✅ Offline First (Dexie IndexedDB)
            - ✅ Nigeria First (Paystack kobo)
            - ✅ Africa First (en-NG i18n)
            - ✅ Vendor Neutral AI (OpenRouter)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
